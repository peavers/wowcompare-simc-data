name: refresh

# Daily extraction of SimC's per-class spell metadata. Builds the pinned
# simc commit in a container, runs `spell_query` for each class, and
# commits the resulting XMLs + .metadata to main. No PR — this repo is
# purely automated data; human edits aren't expected.

on:
  schedule:
    - cron: '0 6 * * *'   # every day at 06:00 UTC
  workflow_dispatch:
    inputs:
      simc_sha:
        description: 'simc commit SHA on the midnight branch (leave blank for latest)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve simc SHA
        id: sha
        run: |
          if [ -n "${{ github.event.inputs.simc_sha }}" ]; then
            sha="${{ github.event.inputs.simc_sha }}"
          else
            sha=$(curl -sL "https://api.github.com/repos/simulationcraft/simc/commits/midnight?per_page=1" | jq -r '.sha')
          fi
          echo "simc_sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Using simc SHA: ${sha}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build simc extractor image
        run: |
          docker build \
            --build-arg SIMC_SHA=${{ steps.sha.outputs.simc_sha }} \
            -t wow-simc-extract:${{ steps.sha.outputs.simc_sha }} \
            tools/simc-extract

      - name: Run extractor
        run: |
          mkdir -p data
          docker run --rm \
            -v "${{ github.workspace }}/data:/out" \
            wow-simc-extract:${{ steps.sha.outputs.simc_sha }}

      - name: Commit and push if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data
          if git diff --cached --quiet; then
            echo "No changes — simc SHA produced identical output."
            exit 0
          fi
          git diff --cached --stat data
          git commit -m "refresh: simc_sha=${{ steps.sha.outputs.simc_sha }}"
          git push origin HEAD:main
